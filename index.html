<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="robots" content="noindex, nofollow">
<title>網站已永久關閉 — 靜月之光</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    min-height: 100vh;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "PingFang TC", "Microsoft JhengHei", sans-serif;
    overflow-x: hidden;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 1200px;
    text-align: center;
  }
  .closed-img {
    width: 100%;
    max-width: 1200px;
    height: auto;
    display: block;
    margin: 0 auto;
    border-radius: 12px;
    box-shadow: 0 0 60px rgba(255, 200, 50, 0.15);
  }
  .footer-note {
    margin-top: 40px;
    color: #888;
    font-size: 14px;
    line-height: 1.8;
    text-align: center;
  }
  .footer-note a {
    color: #d4af37;
    text-decoration: none;
    margin: 0 8px;
  }
  .footer-note a:hover {
    text-decoration: underline;
  }
  .shop-link {
    display: inline-block;
    margin-top: 24px;
    padding: 12px 32px;
    background: linear-gradient(135deg, #d4af37 0%, #b8941f 100%);
    color: #000;
    border-radius: 30px;
    font-size: 16px;
    font-weight: 600;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .shop-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
  }
  .brand {
    margin-top: 40px;
    color: #d4af37;
    font-size: 18px;
    letter-spacing: 4px;
  }
  @media (max-width: 600px) {
    body { padding: 10px; }
    .closed-img { border-radius: 8px; }
    .footer-note { font-size: 13px; margin-top: 24px; }
    .brand { font-size: 16px; margin-top: 24px; }
  }
</style>
</head>
<body>
  <div class="container">
    <img src="closed.png" alt="網站已永久關閉" class="closed-img">

    <div class="brand">🌙 靜月之光</div>

    <div class="footer-note">
      由於網站營運成本持續增加,已無法負荷營運開銷,<br>
      經慎重考慮後,決定即日起永久關閉本站。<br>
      感謝您一直以來的支持與愛護 ❤️
    </div>

    <a href="https://tw.shp.ee/c1VpkoKd" class="shop-link" target="_blank" rel="noopener">
      🛒 靜月之光 蝦皮選物
    </a>

    <div class="footer-note" style="margin-top: 32px; font-size: 12px;">
      水晶 / 天鐵 / 龍宮舍利 / 命理能量配戴<br>
      仍於蝦皮、Threads、Facebook、TikTok 持續經營
    </div>
  </div>
</body>
</html>
