<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>靜月之光 管理後台</title>
<meta name="theme-color" content="#0d0f14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="靜月後台">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="靜月後台">
<link rel="manifest" href="admin-manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png" type="image/png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f14;--card:#161a23;--card-border:#262b38;
  --text:#e2e4ea;--text-dim:#7a7f8e;--accent:#6c7bff;
  --accent-glow:rgba(108,123,255,.15);--success:#34d399;
  --warn:#fbbf24;--danger:#f87171;
  --header-bg:linear-gradient(135deg,#2a2060 0%,#3b2a80 50%,#5c3a9e 100%);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

/* ── Login ── */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:40px 30px;width:100%;max-width:360px;text-align:center}
.login-box h2{margin-bottom:8px;font-size:20px}
.login-box p{color:var(--text-dim);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--card-border);background:#0d0f14;color:var(--text);font-size:15px;outline:none;margin-bottom:16px}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.login-box button:active{opacity:.7}
.login-err{color:var(--danger);font-size:13px;margin-top:10px;display:none}

/* ── Header ── */
.header{background:var(--header-bg);padding:18px 20px 14px;position:sticky;top:0;z-index:100}
.header h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
.header h1 span{font-size:22px}

/* ── Tabs ── */
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--card-border);overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:55px;z-index:99}
.tab{flex:none;padding:13px 18px;font-size:13px;font-weight:500;color:var(--text-dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--text);border-bottom-color:var(--accent)}
.tab:active{opacity:.6}

/* ── Content ── */
.content{padding:16px;max-width:800px;margin:0 auto}
.section{display:none}
.section.active{display:block}

/* ── Stats Grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px 12px;text-align:center;transition:border-color .2s}
.stat-card:active{border-color:var(--accent)}
.stat-num{font-size:28px;font-weight:700;color:var(--accent);line-height:1.2}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;display:flex;align-items:center;justify-content:center;gap:4px}

/* ── Notification List ── */
.notify-section{margin-top:16px}
.notify-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.notify-header h3{font-size:15px;font-weight:600}
.btn-clear{padding:6px 14px;border-radius:8px;border:1px solid var(--danger);color:var(--danger);background:transparent;font-size:12px;cursor:pointer}
.btn-clear:active{background:var(--danger);color:#fff}
.notify-list{display:flex;flex-direction:column;gap:8px}
.notify-item{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:12px 14px}
.notify-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.notify-mode{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.mode-full{background:rgba(108,123,255,.15);color:var(--accent)}
.mode-tarot{background:rgba(52,211,153,.15);color:var(--success)}
.mode-ootk{background:rgba(251,191,36,.15);color:var(--warn)}
.mode-followup{background:rgba(248,113,113,.15);color:var(--danger)}
.notify-time{font-size:11px;color:var(--text-dim)}
.notify-name{font-size:13px;font-weight:600}
.notify-q{font-size:12px;color:var(--text-dim);margin-top:2px}
.notify-badges{display:flex;gap:6px;margin-top:6px}
.badge{font-size:10px;padding:2px 6px;border-radius:3px;background:#262b38;color:var(--text-dim)}
.badge-paid{background:rgba(251,191,36,.15);color:var(--warn)}

/* ── Inventory ── */
.inv-upload{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:20px;margin-bottom:16px}
.inv-upload h3{font-size:15px;margin-bottom:4px}
.inv-upload p{font-size:12px;color:var(--text-dim);margin-bottom:14px}
.btn-upload{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn-upload:active{opacity:.7}
.inv-current{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:20px}
.inv-current h3{font-size:15px;margin-bottom:4px}
.inv-count{font-size:12px;color:var(--text-dim);margin-bottom:12px}
.inv-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.inv-table{width:100%;border-collapse:collapse;font-size:12px}
.inv-table th{text-align:left;padding:8px 10px;background:#1c2030;color:var(--text-dim);font-weight:600;border-bottom:1px solid var(--card-border);white-space:nowrap}
.inv-table td{padding:8px 10px;border-bottom:1px solid #1c2030;white-space:nowrap}
.inv-table tr:hover td{background:var(--accent-glow)}
.btn-download{padding:6px 14px;border-radius:8px;border:1px solid var(--card-border);color:var(--text);background:transparent;font-size:12px;cursor:pointer;margin-top:10px}
.btn-download:active{background:var(--card-border)}
.btn-del-item{background:none;border:none;color:var(--danger);cursor:pointer;font-size:14px;padding:2px 6px}

/* ── Worker ── */
.worker-section{display:flex;flex-direction:column;gap:16px}
.worker-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:20px}
.worker-card h3{font-size:15px;margin-bottom:4px}
.worker-card p{font-size:12px;color:var(--text-dim);margin-bottom:14px}
.worker-status{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--success)}
.status-dot.offline{background:var(--danger)}
.worker-info{font-size:12px;color:var(--text-dim)}
textarea.worker-editor{width:100%;min-height:200px;background:#0d0f14;color:var(--text);border:1px solid var(--card-border);border-radius:8px;padding:12px;font-family:'SF Mono',Menlo,monospace;font-size:11px;resize:vertical;outline:none}
textarea.worker-editor:focus{border-color:var(--accent)}
.btn-deploy{padding:10px 20px;border-radius:10px;border:none;background:var(--success);color:#0d0f14;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px}
.btn-deploy:active{opacity:.7}
.btn-deploy:disabled{opacity:.4;cursor:not-allowed}
.cf-fields{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.cf-field label{font-size:12px;color:var(--text-dim);display:block;margin-bottom:4px}
.cf-field input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--card-border);background:#0d0f14;color:var(--text);font-size:13px;outline:none}
.cf-field input:focus{border-color:var(--accent)}

/* ── Toast ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#2a2e3a;color:var(--text);padding:10px 24px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;border:1px solid var(--card-border)}
.toast.show{opacity:1}

/* ── Loading ── */
.loading{display:flex;justify-content:center;padding:40px}
.loading::after{content:'';width:28px;height:28px;border:3px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text-dim);font-size:13px}
</style>
</head>
<body>

<!-- ══ Login Screen ══ -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <h2>🌙 靜月之光</h2>
    <p>管理後台</p>
    <input type="password" id="tokenInput" placeholder="輸入管理員 Token" autocomplete="off">
    <button onclick="doLogin()">登入</button>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>

<!-- ══ Main App ══ -->
<div id="mainApp" style="display:none">
  <div class="header">
    <h1><span>🌙</span> 靜月之光 管理後台 <a href="https://jingyue.uk#admin=jy_admin_2026" target="_blank" style="font-size:12px;background:rgba(255,255,255,.15);padding:4px 12px;border-radius:6px;color:#fff;margin-left:8px;text-decoration:none">前往網站 ↗</a></h1>
    <div id="googleAuthBar" style="margin-top:8px;display:flex;align-items:center;gap:8px;font-size:12px"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="dashboard">總覽</div>
    <div class="tab" data-tab="inventory">庫存管理</div>
    <div class="tab" data-tab="feedback">回饋</div>
    <div class="tab" data-tab="worker">Worker管理</div>
  </div>

  <div class="content">

    <!-- ══ Dashboard ══ -->
    <div id="sec-dashboard" class="section active">
      <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-num" id="s-total">-</div><div class="stat-label">📊 總使用次數</div></div>
        <div class="stat-card"><div class="stat-num" id="s-today">-</div><div class="stat-label">📅 今日使用</div></div>
        <div class="stat-card"><div class="stat-num" id="s-paid">-</div><div class="stat-label">💰 付費次數</div></div>
        <div class="stat-card"><div class="stat-num" id="s-full">-</div><div class="stat-label">🔮 七維度</div></div>
        <div class="stat-card"><div class="stat-num" id="s-tarot">-</div><div class="stat-label">🃏 塔羅快讀</div></div>
        <div class="stat-card"><div class="stat-num" id="s-ootk">-</div><div class="stat-label">🗝️ 開鑰之法</div></div>
        <div class="stat-card"><div class="stat-num" id="s-followup">-</div><div class="stat-label">💬 追問</div></div>
        <div class="stat-card"><div class="stat-num" id="s-inv">-</div><div class="stat-label">📦 庫存品項</div></div>
        <div class="stat-card"><div class="stat-num" id="s-uptime">-</div><div class="stat-label">⏱ Worker</div></div>
      </div>

      <div class="notify-section">
        <div class="notify-header">
          <h3>📋 最近使用紀錄</h3>
          <button class="btn-clear" onclick="clearNotifications()">清除全部</button>
        </div>
        <div id="notifyList" class="notify-list"><div class="loading"></div></div>
      </div>
    </div>

    <!-- ══ Inventory ══ -->
    <div id="sec-inventory" class="section">

    <!-- ══ Feedback ══ -->
    <div id="sec-feedback" class="section">
      <div class="notify-section">
        <div class="notify-header">
          <h3>📊 用戶回饋</h3>
        </div>
        <div id="feedbackList" class="notify-list"><div class="loading"></div></div>
      </div>
    </div>
      <div class="inv-upload">
        <h3>📦 庫存資料更新</h3>
        <p>上傳 Excel 檔案自動更新水晶庫存資料</p>
        <input type="file" id="excelFile" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcelUpload(event)">
        <button class="btn-upload" onclick="document.getElementById('excelFile').click()">📂 選擇 Excel 檔案</button>
      </div>
      <div class="inv-current">
        <h3>目前資料</h3>
        <div class="inv-count" id="invCount">載入中...</div>
        <div class="inv-table-wrap" id="invTableWrap"></div>
        <button class="btn-download" onclick="downloadInventoryJSON()">⬇ 下載 JSON</button>
      </div>
    </div>

    <!-- ══ Worker ══ -->
    <div id="sec-worker" class="section">
      <div class="worker-section">
        <div class="worker-card">
          <h3>⚡ Worker 狀態</h3>
          <div class="worker-status">
            <div class="status-dot" id="workerDot"></div>
            <span id="workerStatusText">檢查中...</span>
          </div>
          <div class="worker-info" id="workerVersion"></div>
        </div>

        <div class="worker-card">
          <h3>🚀 部署 Worker</h3>
          <p>上傳新的 worker.js 部署到 Cloudflare。需要 Cloudflare API 憑證。</p>
          <div class="cf-fields">
            <div class="cf-field">
              <label>Account ID</label>
              <input type="text" id="cfAccountId" value="4b1e8e7d70f88962c914932ee8c7655a" autocomplete="off">
            </div>
            <div class="cf-field">
              <label>API Token</label>
              <input type="password" id="cfApiToken" placeholder="Cloudflare API Token" autocomplete="off">
            </div>
            <div class="cf-field">
              <label>Worker 名稱</label>
              <input type="text" id="cfWorkerName" value="jy-ai-proxy" autocomplete="off">
            </div>
          </div>
          <input type="file" id="workerFile" accept=".js" style="display:none" onchange="handleWorkerFile(event)">
          <button class="btn-upload" onclick="document.getElementById('workerFile').click()">📂 選擇 worker.js</button>
          <div id="workerFileName" style="font-size:12px;color:var(--text-dim);margin-top:8px"></div>
          <button class="btn-deploy" id="btnDeploy" disabled onclick="deployWorker()">🚀 部署到 Cloudflare</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ═══════════════════════════════════════════════
// Config
// ═══════════════════════════════════════════════
const WORKER_URL = 'https://jy-ai-proxy.onerkk.workers.dev';
let adminToken = '';
let inventoryData = [];
let workerFileContent = null;

// ═══════════════════════════════════════════════
// Google OAuth（與主站共用 localStorage）
// ═══════════════════════════════════════════════
(function(){
  // 從 hash 取 OAuth callback
  var hash = window.location.hash || '';
  var sm = hash.match(/[#&]jy_session=([^&]+)/);
  var nm = hash.match(/[#&]jy_user=([^&]+)/);
  if (sm) {
    try {
      localStorage.setItem('_jy_session', decodeURIComponent(sm[1]));
      if (nm) localStorage.setItem('_jy_session_name', decodeURIComponent(nm[1]));
    } catch(e){}
    var clean = hash.replace(/[#&]jy_session=[^&]+/,'').replace(/[#&]jy_user=[^&]+/,'').replace(/^#&/,'#').replace(/^#$/,'');
    history.replaceState({}, '', location.pathname + location.search + clean);
  }
})();

function _adminGoogleLogin() {
  var redirect = encodeURIComponent(window.location.origin + '/admin.html');
  window.location.href = WORKER_URL + '/auth/google?redirect=' + redirect;
}

function _adminGoogleLogout() {
  var token = '';
  try { token = localStorage.getItem('_jy_session') || ''; } catch(e){}
  if (token) {
    fetch(WORKER_URL + '/auth/logout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_token: token })
    }).catch(function(){});
  }
  try { localStorage.removeItem('_jy_session'); localStorage.removeItem('_jy_session_name'); } catch(e){}
  _updateGoogleAuthBar();
}

function _updateGoogleAuthBar() {
  var bar = document.getElementById('googleAuthBar');
  if (!bar) return;
  var session = '';
  var name = '';
  try { session = localStorage.getItem('_jy_session') || ''; } catch(e){}
  try { name = localStorage.getItem('_jy_session_name') || ''; } catch(e){}
  if (session) {
    bar.innerHTML =
      '<span style="color:#34d399">✦ Google 已登入</span>' +
      '<span style="color:rgba(255,255,255,.6)">' + (name || '').replace(/</g,'&lt;') + '</span>' +
      '<button onclick="_adminGoogleLogout()" style="padding:3px 10px;border-radius:6px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.6);font-size:11px;border:1px solid rgba(255,255,255,.15);cursor:pointer">登出 Google</button>';
  } else {
    bar.innerHTML =
      '<span style="color:var(--warn)">⚠ Google 未登入</span>' +
      '<span style="color:rgba(255,255,255,.45);font-size:11px">（測試命理工具前請先登入）</span>' +
      '<button onclick="_adminGoogleLogin()" style="padding:4px 14px;border-radius:6px;background:rgba(255,255,255,.1);color:#fff;font-size:12px;border:1px solid rgba(255,255,255,.15);cursor:pointer;display:flex;align-items:center;gap:4px">' +
        '<svg width="14" height="14" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#34A853" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#FBBC05" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>' +
        'Google 登入</button>';
  }
}

// 驗證 Google session
(function(){
  var s = '';
  try { s = localStorage.getItem('_jy_session') || ''; } catch(e){}
  if (s) {
    fetch(WORKER_URL + '/auth/me', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_token: s })
    }).then(function(r){ return r.json(); }).then(function(data){
      if (data.loggedIn) {
        try { localStorage.setItem('_jy_session_name', data.name || data.email || ''); } catch(e){}
      } else {
        try { localStorage.removeItem('_jy_session'); localStorage.removeItem('_jy_session_name'); } catch(e){}
      }
      _updateGoogleAuthBar();
    }).catch(function(){ _updateGoogleAuthBar(); });
  } else {
    // 延遲到 DOM ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', _updateGoogleAuthBar);
    } else {
      setTimeout(_updateGoogleAuthBar, 0);
    }
  }
})();

// ═══════════════════════════════════════════════
// Login
// ═══════════════════════════════════════════════
function doLogin() {
  const token = document.getElementById('tokenInput').value.trim();
  if (!token) return;
  adminToken = token;
  // verify by fetching notifications
  fetch(`${WORKER_URL}/admin/notifications?token=${encodeURIComponent(token)}`)
    .then(r => {
      if (r.status === 401) throw new Error('Token 錯誤');
      return r.json();
    })
    .then(() => {
      localStorage.setItem('jy_admin_token', token);
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      loadDashboard();
      loadInventory();
      checkWorkerStatus();
      _updateGoogleAuthBar();
    })
    .catch(e => {
      const el = document.getElementById('loginErr');
      el.textContent = e.message || '連線失敗';
      el.style.display = 'block';
    });
}

// auto-login
(function() {
  const saved = localStorage.getItem('jy_admin_token');
  if (saved) { document.getElementById('tokenInput').value = saved; doLogin(); }
  document.getElementById('tokenInput').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
})();

// ═══════════════════════════════════════════════
// Tabs
// ═══════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('sec-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'feedback') loadFeedback();
  });
});

// ═══════════════════════════════════════════════
// Dashboard
// ═══════════════════════════════════════════════
async function loadDashboard() {
  try {
    const r = await fetch(`${WORKER_URL}/admin/notifications?token=${encodeURIComponent(adminToken)}`);
    const data = await r.json();
    const list = data.notifications || [];
    
    const today = new Date(Date.now() + 8*3600000).toISOString().slice(0,10);
    const todayItems = list.filter(n => (n.time||'').startsWith(today));
    
    document.getElementById('s-total').textContent = list.length;
    document.getElementById('s-today').textContent = todayItems.length;
    document.getElementById('s-paid').textContent = list.filter(n => n.paid).length;
    document.getElementById('s-full').textContent = list.filter(n => n.mode === 'full').length;
    document.getElementById('s-tarot').textContent = list.filter(n => n.mode === 'tarot').length;
    document.getElementById('s-ootk').textContent = list.filter(n => n.mode === 'ootk').length;
    document.getElementById('s-followup').textContent = list.filter(n => n.followUp).length;
    document.getElementById('s-uptime').textContent = '✓';
    
    renderNotifications(list);
  } catch(e) {
    document.getElementById('notifyList').innerHTML = '<div class="empty">載入失敗: ' + e.message + '</div>';
  }
}

function renderNotifications(list) {
  const el = document.getElementById('notifyList');
  if (!list.length) { el.innerHTML = '<div class="empty">暫無使用紀錄</div>'; return; }
  
  el.innerHTML = list.slice(0, 50).map(n => {
    const modeMap = {
      'full': ['七維度', 'mode-full'],
      'tarot': ['塔羅快讀', 'mode-tarot'],
      'ootk': ['開鑰之法', 'mode-ootk'],
      'full_followup': ['七維度追問', 'mode-followup'],
      'tarot_followup': ['塔羅追問', 'mode-followup'],
      'ootk_followup': ['開鑰追問', 'mode-followup']
    };
    const [modeLabel, modeClass] = modeMap[n.mode] || [n.mode, 'mode-full'];
    const time = n.time ? new Date(n.time).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
    
    return `<div class="notify-item">
      <div class="notify-meta">
        <span class="notify-mode ${modeClass}">${modeLabel}</span>
        <span class="notify-time">${time}</span>
      </div>
      <div class="notify-name">${esc(n.name || '匿名')}</div>
      ${n.question ? `<div class="notify-q">❓ ${esc(n.question)}</div>` : ''}
      ${n.story ? `<div class="notify-q" style="margin-top:6px;color:var(--text);border-left:2px solid var(--accent);padding-left:8px;white-space:pre-wrap">💬 ${esc(n.story)}</div>` : ''}
      <div class="notify-badges">
        ${n.paid ? '<span class="badge badge-paid">💰 付費</span>' : '<span class="badge">免費</span>'}
        ${n.followUp ? '<span class="badge">追問</span>' : ''}
      </div>
    </div>`;
  }).join('');
}

async function clearNotifications() {
  if (!confirm('確定清除所有使用紀錄？')) return;
  try {
    await fetch(`${WORKER_URL}/admin/notifications?token=${encodeURIComponent(adminToken)}`, { method: 'DELETE' });
    toast('已清除');
    loadDashboard();
  } catch(e) { toast('清除失敗: ' + e.message); }
}

// ═══════════════════════════════════════════════
// Feedback
// ═══════════════════════════════════════════════
async function loadFeedback() {
  const el = document.getElementById('feedbackList');
  el.innerHTML = '<div class="loading"></div>';
  try {
    const r = await fetch(`${WORKER_URL}/admin/feedback?token=${encodeURIComponent(adminToken)}`);
    const data = await r.json();
    const list = data.feedbacks || [];
    if (!list.length) { el.innerHTML = '<div class="empty">暫無回饋</div>'; return; }
    el.innerHTML = list.map(fb => {
      const time = fb.time ? new Date(fb.time).toLocaleString('zh-TW', { timeZone: 'Asia/Taipei', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }) : '';
      const ratingIcon = fb.rating === 'good' ? '👍 準' : '👎 不準';
      const ratingClass = fb.rating === 'good' ? 'mode-tarot' : 'mode-followup';
      return `<div class="notify-item">
        <div class="notify-meta">
          <span class="notify-mode ${ratingClass}">${ratingIcon}</span>
          <span class="notify-time">${time}</span>
        </div>
        <div class="notify-name">${esc(fb.name || '匿名')}</div>
        ${fb.question ? `<div class="notify-q">❓ ${esc(fb.question)}</div>` : ''}
        ${fb.reasons ? `<div class="notify-q" style="margin-top:4px;color:var(--danger)">原因：${esc(fb.reasons)}</div>` : ''}
        ${fb.comment ? `<div class="notify-q" style="margin-top:4px;color:var(--text-dim)">💬 ${esc(fb.comment)}</div>` : ''}
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = '<div class="empty">載入失敗: ' + e.message + '</div>'; }
}

// ═══════════════════════════════════════════════
// Inventory
// ═══════════════════════════════════════════════
async function loadInventory() {
  try {
    const r = await fetch(`${WORKER_URL}/admin/inventory?token=${encodeURIComponent(adminToken)}`);
    const data = await r.json();
    inventoryData = data.items || [];
    renderInventory();
    document.getElementById('s-inv').textContent = inventoryData.length;
  } catch(e) {
    document.getElementById('invCount').textContent = '載入失敗';
  }
}

function renderInventory() {
  document.getElementById('invCount').textContent = `品項數: ${inventoryData.length}`;
  const wrap = document.getElementById('invTableWrap');
  
  if (!inventoryData.length) {
    wrap.innerHTML = '<div class="empty">尚無庫存資料，請上傳 Excel</div>';
    return;
  }
  
  // get all keys from first item
  const keys = Object.keys(inventoryData[0]);
  
  wrap.innerHTML = `<table class="inv-table">
    <thead><tr>${keys.map(k => `<th>${esc(k)}</th>`).join('')}<th>操作</th></tr></thead>
    <tbody>${inventoryData.map((item, i) => 
      `<tr>${keys.map(k => `<td>${esc(String(item[k]||''))}</td>`).join('')}<td><button class="btn-del-item" onclick="deleteInvItem(${i})">✕</button></td></tr>`
    ).join('')}</tbody>
  </table>`;
}

function handleExcelUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = async function(ev) {
    try {
      const data = new Uint8Array(ev.target.result);
      const wb = XLSX.read(data, { type: 'array' });
      // 優先讀「進銷總表」
      const sheetName = wb.SheetNames.find(s => s === '進銷總表') || wb.SheetNames.find(s => s.includes('進銷')) || wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      
      // 找到真正的標題行（含「品項」或「品名」或「水晶」的那行）
      const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
      let headerRow = 0;
      for (let r = range.s.r; r <= Math.min(range.s.r + 10, range.e.r); r++) {
        for (let c = range.s.c; c <= range.e.c; c++) {
          const cell = ws[XLSX.utils.encode_cell({r, c})];
          const val = cell ? String(cell.v || '') : '';
          if (val.includes('品項') || val.includes('品名') || val.includes('水晶名稱')) {
            headerRow = r;
            break;
          }
        }
        if (headerRow > 0) break;
      }
      
      const json = XLSX.utils.sheet_to_json(ws, { range: headerRow, defval: '' });
      // 過濾空行（品項名稱為空的）
      const filtered = json.filter(row => {
        const name = row['品項名稱'] || row['品名'] || row['水晶名稱'] || row['name'] || '';
        return name && typeof name === 'string' && name.length > 0;
      });
      
      if (!filtered.length) { toast('找不到有效的庫存資料'); return; }
      
      // upload to KV
      const r = await fetch(`${WORKER_URL}/admin/inventory?token=${encodeURIComponent(adminToken)}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ items: filtered })
      });
      const result = await r.json();
      
      if (result.ok) {
        inventoryData = filtered;
        renderInventory();
        document.getElementById('s-inv').textContent = filtered.length;
        toast(`已更新 ${filtered.length} 筆庫存資料`);
      } else {
        toast('更新失敗: ' + (result.error || ''));
      }
    } catch(err) {
      toast('解析失敗: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

async function deleteInvItem(idx) {
  inventoryData.splice(idx, 1);
  // save back
  try {
    await fetch(`${WORKER_URL}/admin/inventory?token=${encodeURIComponent(adminToken)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: inventoryData })
    });
    renderInventory();
    document.getElementById('s-inv').textContent = inventoryData.length;
    toast('已刪除');
  } catch(e) { toast('刪除失敗'); }
}

function downloadInventoryJSON() {
  if (!inventoryData.length) { toast('沒有資料'); return; }
  const blob = new Blob([JSON.stringify(inventoryData, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'crystal_inventory.json'; a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════
// Worker Management
// ═══════════════════════════════════════════════
async function checkWorkerStatus() {
  try {
    const r = await fetch(`${WORKER_URL}/version`);
    const data = await r.json();
    document.getElementById('workerDot').className = 'status-dot';
    document.getElementById('workerStatusText').textContent = '運行中';
    document.getElementById('workerVersion').textContent = `版本: ${data.version || 'unknown'} | 部署: ${data.deployed ? new Date(data.deployed).toLocaleString('zh-TW',{timeZone:'Asia/Taipei'}) : '-'}`;
  } catch(e) {
    document.getElementById('workerDot').className = 'status-dot offline';
    document.getElementById('workerStatusText').textContent = '離線';
  }
  
  // restore CF credentials (localStorage = 永久保存)
  const saved = localStorage.getItem('jy_cf_creds');
  if (saved) {
    try {
      const c = JSON.parse(saved);
      if (c.accountId) document.getElementById('cfAccountId').value = c.accountId;
      if (c.workerName) document.getElementById('cfWorkerName').value = c.workerName;
      if (c.apiToken) document.getElementById('cfApiToken').value = c.apiToken;
    } catch(_) {}
  }
}

function handleWorkerFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    workerFileContent = ev.target.result;
    document.getElementById('workerFileName').textContent = `✓ ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
    document.getElementById('btnDeploy').disabled = false;
  };
  reader.readAsText(file);
  e.target.value = '';
}

async function deployWorker() {
  const accountId = document.getElementById('cfAccountId').value.trim();
  const apiToken = document.getElementById('cfApiToken').value.trim();
  const workerName = document.getElementById('cfWorkerName').value.trim() || 'jy-ai-proxy';
  
  if (!accountId || !apiToken) { toast('請填入 Cloudflare Account ID 和 API Token'); return; }
  if (!workerFileContent) { toast('請先選擇 worker.js 檔案'); return; }
  
  // save creds to localStorage (永久保存，下次自動帶入)
  localStorage.setItem('jy_cf_creds', JSON.stringify({ accountId, workerName, apiToken }));
  
  const btn = document.getElementById('btnDeploy');
  btn.disabled = true;
  btn.textContent = '⏳ 部署中...';
  
  try {
    // 透過 Worker 中轉部署（避免 CORS 問題）
    const r = await fetch(
      `${WORKER_URL}/admin/deploy-worker?token=${encodeURIComponent(adminToken)}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ accountId, apiToken, workerName, code: workerFileContent })
      }
    );
    
    const result = await r.json();
    
    if (result.success) {
      toast('✓ Worker 部署成功！');
      checkWorkerStatus();
    } else {
      const errMsg = result.errors?.map(e => e.message).join(', ') || result.error || '部署失敗';
      toast('✗ ' + errMsg);
    }
  } catch(e) {
    toast('部署錯誤: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '🚀 部署到 Cloudflare';
  }
}

// ═══════════════════════════════════════════════
// Utilities
// ═══════════════════════════════════════════════
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// PWA Service Worker 註冊
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('admin-sw.js').catch(() => {});
}
