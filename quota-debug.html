<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>配額扣次診斷・靜月之光</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: linear-gradient(180deg, #0a0a12 0%, #141428 100%);
    color: #e8e4f0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    padding: 16px 12px 40px;
    font-size: 14px;
    line-height: 1.5;
  }
  h1 {
    color: #d4af37;
    font-size: 18px;
    margin: 0 0 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .subtitle {
    color: #9690aa;
    font-size: 12px;
    margin-bottom: 16px;
  }
  .card {
    background: rgba(30, 26, 50, 0.6);
    border: 1px solid rgba(212, 175, 55, 0.2);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .card h2 {
    font-size: 14px;
    color: #d4af37;
    margin: 0 0 10px;
    font-weight: 600;
  }
  .state-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .state-item {
    background: rgba(10, 10, 18, 0.5);
    padding: 8px 10px;
    border-radius: 8px;
    border-left: 3px solid #6a5fbf;
  }
  .state-item .label {
    font-size: 11px;
    color: #9690aa;
    margin-bottom: 2px;
  }
  .state-item .value {
    font-size: 16px;
    font-weight: 600;
    color: #e8e4f0;
  }
  .btn {
    display: inline-block;
    background: linear-gradient(135deg, #6a5fbf, #8b7dd6);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    margin: 4px 6px 4px 0;
    font-family: inherit;
  }
  .btn.secondary {
    background: rgba(150, 144, 170, 0.15);
    color: #b8b2c8;
    border: 1px solid rgba(150, 144, 170, 0.3);
  }
  .btn.danger {
    background: rgba(220, 80, 80, 0.2);
    color: #ff8888;
    border: 1px solid rgba(220, 80, 80, 0.4);
  }
  .btn:active { transform: scale(0.97); }
  .entry {
    background: rgba(10, 10, 18, 0.6);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
    border-left: 4px solid #6a5fbf;
    font-size: 12px;
  }
  .entry.branch-sub_use {
    border-left-color: #5cc87c;
  }
  .entry.branch-7d_month {
    border-left-color: #e89c4a;
  }
  .entry.branch-none {
    border-left-color: #d54d4d;
  }
  .entry-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .time {
    color: #9690aa;
    font-size: 11px;
    font-family: "SF Mono", Menlo, monospace;
  }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
  .badge-green { background: rgba(92, 200, 124, 0.2); color: #7ed79a; }
  .badge-orange { background: rgba(232, 156, 74, 0.2); color: #f2b06b; }
  .badge-red { background: rgba(213, 77, 77, 0.2); color: #ff7a7a; }
  .badge-grey { background: rgba(150, 144, 170, 0.2); color: #b8b2c8; }
  .badge-purple { background: rgba(106, 95, 191, 0.25); color: #b0a4f0; }
  .mode-raw {
    font-family: "SF Mono", Menlo, monospace;
    background: rgba(212, 175, 55, 0.12);
    color: #d4af37;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 11px;
  }
  .flag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin: 6px 0;
  }
  .flag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: "SF Mono", Menlo, monospace;
  }
  .flag-true { background: rgba(92, 200, 124, 0.15); color: #7ed79a; }
  .flag-false { background: rgba(100, 100, 120, 0.15); color: #6a6380; }
  .diff-row {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 6px;
    font-size: 11px;
    margin-top: 6px;
    padding: 6px 8px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 6px;
  }
  .diff-label { color: #9690aa; }
  .diff-val {
    font-family: "SF Mono", Menlo, monospace;
    color: #e8e4f0;
  }
  .changed { color: #7ed79a; font-weight: 600; }
  .unchanged { color: #6a6380; }
  .empty-state {
    text-align: center;
    padding: 30px 20px;
    color: #6a6380;
    font-size: 13px;
  }
  .diagnosis {
    background: rgba(212, 175, 55, 0.08);
    border: 1px solid rgba(212, 175, 55, 0.3);
    border-radius: 8px;
    padding: 10px 12px;
    margin-top: 8px;
    font-size: 12px;
    color: #e8e4f0;
    line-height: 1.6;
  }
  .diagnosis strong { color: #d4af37; }
  .hint {
    font-size: 11px;
    color: #9690aa;
    margin-top: 6px;
    line-height: 1.5;
  }
  .loading {
    text-align: center;
    padding: 20px;
    color: #9690aa;
  }
  .err {
    background: rgba(213, 77, 77, 0.15);
    border: 1px solid rgba(213, 77, 77, 0.4);
    padding: 10px;
    border-radius: 8px;
    color: #ff9999;
    font-size: 12px;
  }
  code {
    font-family: "SF Mono", Menlo, monospace;
    background: rgba(0, 0, 0, 0.3);
    padding: 1px 5px;
    border-radius: 4px;
    color: #d4af37;
    font-size: 11px;
  }
</style>
</head>
<body>
  <h1>🔍 配額扣次診斷</h1>
  <div class="subtitle">靜月之光 · quota_debug v61.4 · 追蹤 sub_use / 7d_month 扣次邏輯</div>

  <div class="card">
    <div>
      <button class="btn" onclick="loadAll()">🔄 重新整理</button>
      <button class="btn secondary" onclick="loadAll(true)">🛡 管理員全部</button>
      <button class="btn danger" onclick="clearLogs()">🗑 清除我的紀錄</button>
    </div>
    <div class="hint">
      一般使用者看自己最近的扣配額紀錄。<br>
      管理員模式需在 URL 加 <code>?admin=1&token=xxx</code>。
    </div>
  </div>

  <div id="current" class="card" style="display:none">
    <h2>📊 目前 KV 實際狀態</h2>
    <div class="state-grid" id="currentGrid"></div>
    <div class="hint" id="currentHint"></div>
  </div>

  <div id="entries"></div>

<script>
(function() {
  const WORKER = 'https://jy-ai-proxy.onerkk.workers.dev';
  // 從 localStorage 抓目前登入的 session token（static 站不能用 cookie httpOnly）
  function getSessionToken() {
    // 優先從 URL 讀（跨域情境），其次 localStorage
    try {
      const u = new URL(location.href);
      const urlS = u.searchParams.get('s');
      if (urlS) return urlS;
    } catch(_){}
    try {
      return localStorage.getItem('_jy_session') || localStorage.getItem('_jy_session_token') || '';
    } catch(_) { return ''; }
  }
  function getAdminToken() {
    const u = new URL(location.href);
    return u.searchParams.get('token') || '';
  }
  function isAdminMode() {
    const u = new URL(location.href);
    return u.searchParams.get('admin') === '1';
  }

  function fmtBool(v, name) {
    const cls = v ? 'flag-true' : 'flag-false';
    return `<span class="flag ${cls}">${name}=${v ? 'true' : 'false'}</span>`;
  }

  function branchBadge(b) {
    if (b === 'sub_use') return '<span class="badge badge-green">✓ 扣塔羅日</span>';
    if (b === '7d_month') return '<span class="badge badge-orange">扣七維月</span>';
    return '<span class="badge badge-red">❌ 沒扣任何配額</span>';
  }

  function modeBadge(mode) {
    const m = mode || '(none)';
    let cls = 'badge-grey';
    if (m === 'ootk') cls = 'badge-purple';
    else if (m === 'full') cls = 'badge-orange';
    else if (m === 'tarot_only') cls = 'badge-green';
    else if (m.indexOf('followup') >= 0) cls = 'badge-grey';
    return `<span class="mode-raw">mode=${m}</span>`;
  }

  function diagnoseEntry(e) {
    const f = e.flags || {};
    const b = e.branch;
    const m = e.mode_raw;
    const before = e.before || {};
    const after = e.after || {};
    const subUseDelta = (after.sub_use || 0) - (before.sub_use || 0);
    const d7Delta = (after.d7_month || 0) - (before.d7_month || 0);

    // 如果是開鑰卻沒扣到 sub_use
    if (m === 'ootk' && subUseDelta === 0 && b !== 'sub_use') {
      if (!f.isSubscriber) {
        return `<strong>🎯 BUG 定位：</strong>用戶送了 <code>ootk</code> 但 <code>isSubscriber=false</code>。<br>
        → 檢查 <code>getUserSubTier(userKey)</code> 是否在這次請求回傳 null。<br>
        → 可能原因：KV 延遲、sub expiresAt 判斷錯誤、userKey 對不上 KV 實際 key。`;
      }
      if (!f.isOotk) {
        return `<strong>🎯 BUG 定位：</strong>用戶送了 <code>mode=ootk</code> 但 <code>isOotk=false</code>。<br>
        → 檢查 14834 行的 <code>isOotk = (payload.mode === 'ootk' || isOotkFollowUp)</code>。<br>
        → 可能原因：payload.mode 被中間層改寫、字串比對異常。`;
      }
      if (f.isOpusDepth) {
        return `<strong>⚠️ 這次跑 Opus 深度</strong>，走的是 opus_month 扣額路徑（不扣 sub_use）。這是設計內行為。`;
      }
      return `<strong>⚠️ 異常：</strong>isSubscriber 和 isOotk 都 true 但沒扣到 sub_use。branch=${b}。建議看 worker.js 15545 的完整條件。`;
    }

    // 正常情況
    if (m === 'ootk' && b === 'sub_use' && subUseDelta === 1) {
      return `<strong>✅ 正常：</strong>開鑰扣了塔羅日 1 次（${before.sub_use} → ${after.sub_use}）。`;
    }
    if (m === 'full' && b === '7d_month' && d7Delta === 1) {
      return `<strong>✅ 正常：</strong>七維度扣了月額 1 次（${before.d7_month} → ${after.d7_month}）。`;
    }
    if (m === 'tarot_only' && b === 'sub_use' && subUseDelta === 1) {
      return `<strong>✅ 正常：</strong>塔羅扣了日額 1 次。`;
    }
    if (b === 'none' && (m || '').indexOf('followup') >= 0) {
      return `<span style="color:#9690aa">追問路徑不扣主配額（設計內）。</span>`;
    }
    if (b === 'none' && !f.isSubscriber) {
      return `<span style="color:#9690aa">非會員路徑（isSubscriber=false），扣的是免費額度或付費 token，不在本 log 範圍。</span>`;
    }
    return '';
  }

  function renderEntry(e) {
    const f = e.flags || {};
    const before = e.before || {};
    const after = e.after || {};
    const subUseDelta = (after.sub_use || 0) - (before.sub_use || 0);
    const d7Delta = (after.d7_month || 0) - (before.d7_month || 0);
    const flags = ['isSubscriber', 'isOpusDepth', 'isOotk', 'isOotkFollowUp', 'isTarotOnly', 'isTarotFollowUp', 'isFullFollowUpMode']
      .map(k => fmtBool(!!f[k], k)).join('');
    const diag = diagnoseEntry(e);

    return `
      <div class="entry branch-${e.branch || 'none'}">
        <div class="entry-head">
          <span class="time">${e.time || ''}</span>
          ${branchBadge(e.branch)}
        </div>
        <div style="margin-bottom:6px">
          ${modeBadge(e.mode_raw)}
          <span style="color:#9690aa;font-size:11px">${e.email || 'anon'}</span>
        </div>
        <div class="flag-row">${flags}</div>
        <div class="diff-row">
          <span class="diff-label">sub_use</span>
          <span class="diff-val">
            <span class="${subUseDelta !== 0 ? 'changed' : 'unchanged'}">${before.sub_use || 0} → ${after.sub_use || 0}</span>
            ${subUseDelta !== 0 ? `<strong style="color:#7ed79a"> (+${subUseDelta})</strong>` : ''}
          </span>
          <span class="diff-label">7d_month</span>
          <span class="diff-val">
            <span class="${d7Delta !== 0 ? 'changed' : 'unchanged'}">${before.d7_month || 0} → ${after.d7_month || 0}</span>
            ${d7Delta !== 0 ? `<strong style="color:#f2b06b"> (+${d7Delta})</strong>` : ''}
          </span>
        </div>
        ${diag ? `<div class="diagnosis">${diag}</div>` : ''}
      </div>
    `;
  }

  function renderCurrent(state) {
    if (!state) { document.getElementById('current').style.display = 'none'; return; }
    document.getElementById('current').style.display = 'block';
    document.getElementById('currentGrid').innerHTML = `
      <div class="state-item"><div class="label">今日塔羅日</div><div class="value">${state.sub_use_today}</div></div>
      <div class="state-item"><div class="label">本月七維月</div><div class="value">${state.d7_month_current}</div></div>
      <div class="state-item"><div class="label">本月 Opus</div><div class="value">${state.opus_month_current}</div></div>
      <div class="state-item"><div class="label">日期</div><div class="value" style="font-size:12px">${state.today}</div></div>
    `;
    document.getElementById('currentHint').innerHTML = `
      <code>userKey=${state.userKey}</code><br>
      <code>email=${state.email}</code>
    `;
  }

  window.loadAll = async function(wantAll) {
    const box = document.getElementById('entries');
    box.innerHTML = '<div class="loading">讀取中⋯</div>';
    try {
      const s = getSessionToken();
      const adminTok = getAdminToken();
      const params = new URLSearchParams();
      if (s) params.set('s', s);
      if (wantAll && isAdminMode() && adminTok) {
        params.set('token', adminTok);
        params.set('all', '1');
      }
      const resp = await fetch(`${WORKER}/quota-debug?${params.toString()}`);
      const data = await resp.json();
      if (data.error) {
        box.innerHTML = `<div class="err">❌ ${data.error}</div>
          <div class="hint">你需要先在靜月主站登入，或在此頁面 URL 加 <code>?admin=1&token=你的管理員token</code>。</div>`;
        return;
      }
      renderCurrent(data.currentState);
      if (!data.entries || !data.entries.length) {
        box.innerHTML = `<div class="empty-state">
          尚無 log 紀錄<br><br>
          <span style="font-size:11px">部署新 worker 後，去用一次開鑰/塔羅/七維度，log 就會出現。</span>
        </div>`;
        return;
      }
      box.innerHTML = data.entries.map(renderEntry).join('');
    } catch(e) {
      box.innerHTML = `<div class="err">網路錯誤: ${e.message}</div>`;
    }
  };

  window.clearLogs = async function() {
    if (!confirm('確定清掉你的 quota_debug log？這不影響實際配額。')) return;
    const s = getSessionToken();
    const params = new URLSearchParams();
    if (s) params.set('s', s);
    params.set('clear', '1');
    const adminTok = getAdminToken();
    if (isAdminMode() && adminTok) { params.set('token', adminTok); params.set('all', '1'); }
    try {
      const resp = await fetch(`${WORKER}/quota-debug?${params.toString()}`);
      const data = await resp.json();
      if (data.ok) {
        alert(`已清除 ${data.cleared} 筆`);
        loadAll();
      } else {
        alert('清除失敗: ' + (data.error || 'unknown'));
      }
    } catch(e) { alert('網路錯誤: ' + e.message); }
  };

  loadAll();
})();
</script>
</body>
</html>
